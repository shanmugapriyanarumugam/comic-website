<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manga Comic Website</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    background:#050505;
    color:white;
    overflow-x:hidden;

    font-family:'Montserrat',sans-serif;
}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#111;
}

::-webkit-scrollbar-thumb{
    background:linear-gradient(#ff9800,#ff3d00);
    border-radius:20px;
}

/* =========================
HERO
========================= */

.hero{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;

    padding:20px;

    background:
    radial-gradient(circle at top,
    #2c1360 0%,
    #050505 70%);

    position:relative;
    overflow:hidden;
}

.hero::before{

    content:'';

    position:absolute;

    width:700px;
    height:700px;

    background:
    radial-gradient(circle,
    rgba(255,153,0,.25),
    transparent 70%);

    animation:pulse 4s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.15);
    }

    100%{
        transform:scale(1);
    }
}

.hero h1{

    position:relative;
    z-index:2;

    font-family:'Bangers',cursive;

    font-size:clamp(3rem,10vw,8rem);

    line-height:1;

    letter-spacing:5px;

    color:#ff9800;

    text-shadow:
    5px 5px 0 #ff3d00,
    10px 10px 20px rgba(0,0,0,.5);
}

.hero h1 span:nth-child(1){
    color:#4fc3ff;
}

.hero h1 span:nth-child(2){
    color:#00ff88;
}

.subtitle{

    position:relative;
    z-index:2;

    margin-top:25px;

    font-size:1.3rem;

    color:#ffffffd8;
}

.read-btn{

    position:relative;
    z-index:2;

    margin-top:40px;
}

.read-btn a{

    text-decoration:none;

    background:
    linear-gradient(135deg,#ff9800,#ff3d00);

    color:white;

    padding:18px 45px;

    border-radius:60px;

    font-family:'Bangers',cursive;

    font-size:1.5rem;

    letter-spacing:2px;

    transition:.4s;

    box-shadow:
    0 0 25px rgba(255,153,0,.5);
}

.read-btn a:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 45px rgba(255,153,0,.8);
}

/* =========================
NAVBAR
========================= */

nav{

    position:sticky;
    top:0;

    z-index:999;

    background:rgba(0,0,0,.85);

    backdrop-filter:blur(10px);

    padding:18px;

    display:flex;
    justify-content:center;
    gap:25px;

    border-bottom:1px solid rgba(255,255,255,.08);
}

nav a{

    text-decoration:none;

    color:white;

    font-weight:700;

    transition:.3s;
}

nav a:hover{
    color:#ff9800;
}

/* =========================
MANGA CONTAINER
========================= */

.manga-container{

    max-width:1200px;

    margin:auto;

    padding:60px 15px;
}

/* =========================
COMIC PAGE
========================= */

.comic-page{
    margin-bottom:90px;
}

.page-heading{

    display:flex;
    align-items:center;
    gap:18px;

    margin-bottom:25px;
}

.page-number{

    width:75px;
    height:75px;

    border-radius:18px;

    background:
    linear-gradient(135deg,#ff9800,#ff3d00);

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Bangers',cursive;

    font-size:2rem;

    box-shadow:
    0 0 25px rgba(255,153,0,.5);
}

.page-title{

    font-family:'Bangers',cursive;

    font-size:2.3rem;

    letter-spacing:2px;
}

/* =========================
COMIC FRAME
========================= */

.comic-frame{

    overflow:hidden;

    border-radius:28px;

    border:4px solid #ffcc00;

    background:#111;

    box-shadow:
    0 0 30px rgba(255,204,0,.25),
    0 20px 80px rgba(0,0,0,.9);

    transition:.5s;
}

.comic-frame:hover{

    transform:
    translateY(-10px)
    scale(1.01);
}

.comic-frame img{

    width:100%;
    display:block;

    transition:.5s;

    filter:
    contrast(1.08)
    saturate(1.12)
    brightness(1.03);
}

.comic-frame:hover img{
    transform:scale(1.02);
}

/* =========================
FOOTER
========================= */

footer{

    padding:70px 20px;

    text-align:center;

    background:#080808;

    border-top:1px solid rgba(255,255,255,.08);
}

footer h2{

    font-family:'Bangers',cursive;

    font-size:3rem;

    color:#ff9800;

    letter-spacing:3px;
}

footer p{

    margin-top:18px;

    color:#ffffff99;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    nav{
        gap:12px;
        flex-wrap:wrap;
    }

    nav a{
        font-size:.9rem;
    }

    .page-heading{
        flex-direction:column;
        align-items:flex-start;
    }

    .page-number{
        width:60px;
        height:60px;
        font-size:1.6rem;
    }

    .page-title{
        font-size:1.5rem;
    }

    .comic-frame{
        border-radius:18px;
    }

    .subtitle{
        font-size:1rem;
    }

    .read-btn a{
        font-size:1.2rem;
        padding:14px 35px;
    }
}

</style>

</head>
